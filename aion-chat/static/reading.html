<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>陪伴阅读</title>
<link rel="stylesheet" href="/static/common.css">
<style>
/* ── 书库视图 ── */
.library-view { display: flex; flex-direction: column; flex: 1; min-height: 0; }
.reader-view  { display: none; }

.upload-area {
  border: 2px dashed var(--border);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  color: var(--text3);
  cursor: pointer;
  transition: border-color 0.2s;
  margin-bottom: 16px;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--accent);
  color: var(--accent);
}
.upload-area input { display: none; }
.upload-area .upload-icon { font-size: 32px; margin-bottom: 8px; }
.upload-area .upload-text { font-size: 14px; }
.upload-area.uploading { pointer-events: none; opacity: 0.6; }

/* 书籍列表 */
.book-list { display: flex; flex-direction: column; gap: 12px; }
.book-card {
  display: flex;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.book-card:active { transform: scale(0.98); }
.book-cover {
  width: 60px;
  height: 80px;
  border-radius: 6px;
  background: var(--surface2);
  flex-shrink: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.book-cover img { width: 100%; height: 100%; object-fit: cover; }
.book-cover .no-cover { font-size: 28px; }
.book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.book-title { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.book-author { font-size: 12px; color: var(--text2); margin-top: 2px; }
.book-meta { font-size: 11px; color: var(--text3); margin-top: 6px; }
.book-delete {
  align-self: center;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  flex-shrink: 0;
}
.book-delete:hover { color: var(--danger); }

/* ── 阅读器视图 ── */
.reader-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,249,245,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  flex-shrink: 0;
  z-index: 10;
}
.reader-topbar .back-reader {
  background: none; border: none; color: var(--accent);
  font-size: 20px; cursor: pointer; padding: 4px 6px;
}
.reader-topbar .chapter-title {
  flex: 1; font-size: 15px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.reader-topbar .invite-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 14px; padding: 5px 12px; font-size: 12px;
  font-weight: 600; cursor: pointer; white-space: nowrap;
  flex-shrink: 0; transition: opacity 0.2s;
  display: flex; align-items: center; gap: 4px;
}
.reader-topbar .invite-btn:disabled { opacity: 0.5; cursor: default; }
.reader-topbar .invite-btn .spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.topbar-icon-btn {
  background: none; border: none; font-size: 18px;
  cursor: pointer; padding: 4px 6px; color: var(--text);
}

/* 阅读内容区 */
.reader-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px 80px;
  font-size: 16px;
  line-height: 1.85;
  color: var(--text);
  -webkit-overflow-scrolling: touch;
}
.reader-content p[data-p] {
  margin-bottom: 12px;
  text-indent: 2em;
  position: relative;
}
.reader-content .book-img {
  text-align: center;
  margin: 16px 0;
}
.reader-content .book-img img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
}

/* 批注状态条 */
.segment-status {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: var(--surface2);
  font-size: 12px;
  color: var(--text2);
  flex-shrink: 0;
}
.segment-status .seg-block {
  width: 18px; height: 8px; border-radius: 3px;
  background: var(--border); transition: background 0.3s;
}
.segment-status .seg-block.done { background: #66bb6a; }
.segment-status .seg-block.annotating { background: var(--accent); animation: segPulse 1s infinite alternate; }
@keyframes segPulse { to { opacity: 0.5; } }
.segment-status .seg-label { margin-left: auto; }

/* AI 批注气泡 */
.anno-bubble {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  margin-left: 6px;
  cursor: pointer;
  vertical-align: middle;
  position: relative;
  box-shadow: 0 2px 6px rgba(255,131,89,0.3);
  transition: transform 0.15s;
}
.anno-bubble.connor {
  box-shadow: 0 2px 6px rgba(89,131,255,0.3);
}
.anno-bubble:active { transform: scale(0.9); }
.anno-bubble img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.anno-bubble::after {
  content: '💭';
  position: absolute;
  top: -6px;
  right: -6px;
  font-size: 10px;
  line-height: 1;
  pointer-events: none;
}

/* 批注弹窗 */
.anno-popup {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(0,0,0,0.4);
  align-items: flex-end;
  justify-content: center;
}
.anno-popup.show { display: flex; }
.anno-popup-card {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  max-width: 500px;
  width: 100%;
  max-height: 50vh;
  overflow-y: auto;
  padding: 20px;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.anno-popup-card .anno-type {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 6px;
}
.anno-popup-card .anno-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}
.anno-popup-card .anno-close {
  margin-top: 12px;
  text-align: center;
}
.anno-popup-card .anno-close button {
  background: var(--surface2); border: none; border-radius: 8px;
  padding: 8px 24px; font-size: 13px; color: var(--text2); cursor: pointer;
}

/* 章节底部摘要按钮 */
.summary-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 16px; font-size: 13px;
  color: var(--text2); cursor: pointer; margin-top: 20px;
}
.summary-btn:hover { border-color: var(--accent); color: var(--accent); }

/* 音乐卡片 */
.anno-music-card {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 12px;
  margin-top: 8px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.anno-music-card:hover { border-color: var(--accent); }
.anno-music-card .music-icon { font-size: 18px; }
.anno-music-card .music-text { font-size: 13px; color: var(--text); flex: 1; }
.anno-music-card .music-play { font-size: 12px; color: var(--accent); font-weight: 600; white-space: nowrap; }

/* 用户高亮（框选提问持久化） */
.user-hl {
  text-decoration: underline;
  text-decoration-color: #FF8359;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 2px;
}
.user-hl:active {
  background: rgba(255, 131, 89, 0.12);
}

/* 高亮详情弹窗 */
.hl-popup {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(0,0,0,0.4);
  align-items: flex-end;
  justify-content: center;
}
.hl-popup.show { display: flex; }
.hl-popup-card {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  max-width: 500px;
  width: 100%;
  max-height: 60vh;
  overflow-y: auto;
  padding: 20px;
  animation: slideUp 0.25s ease-out;
}
.hl-popup-card .hl-quote {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  padding: 8px 12px;
  background: var(--surface2);
  border-left: 3px solid #FF8359;
  border-radius: 0 6px 6px 0;
  margin-bottom: 12px;
}
.hl-popup-card .hl-question {
  font-size: 14px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
.hl-popup-card .hl-answer {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 12px;
  white-space: pre-wrap;
}
.hl-popup-card .hl-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}
.hl-popup-card .hl-delete-btn {
  background: none; border: none; color: var(--text3);
  font-size: 12px; cursor: pointer; padding: 4px 8px;
}
.hl-popup-card .hl-delete-btn:hover { color: var(--danger, #e53935); }
.hl-popup-card .hl-close-btn {
  background: var(--surface2); border: none; border-radius: 8px;
  padding: 8px 24px; font-size: 13px; color: var(--text2); cursor: pointer;
}

/* 选中文字浮动工具栏 */
.sel-toolbar {
  display: none;
  position: absolute;
  z-index: 30;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  padding: 4px 6px;
  white-space: nowrap;
  animation: fadeIn 0.15s ease-out;
  gap: 2px;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.sel-toolbar button {
  background: none; border: none; font-size: 12px; color: var(--accent);
  font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 14px;
}
.sel-toolbar button:active { background: var(--surface2); }
.sel-toolbar button.connor-btn { color: #5b8af7; }
.sel-toolbar button.group-btn { color: #9c60d4; }

/* 提问弹窗 */
.ask-popup {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: rgba(0,0,0,0.4);
  align-items: flex-end;
  justify-content: center;
}
.ask-popup.show { display: flex; }
.ask-popup-card {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  max-width: 500px;
  width: 100%;
  padding: 20px;
  animation: slideUp 0.25s ease-out;
}
.ask-popup-card .ask-quote {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.5;
  padding: 8px 12px;
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  margin-bottom: 12px;
  max-height: 60px;
  overflow-y: auto;
}
.ask-popup-card .ask-input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.ask-popup-card .ask-input-row input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 10px 14px;
  font-size: 14px;
  background: var(--surface2);
  color: var(--text);
  outline: none;
}
.ask-popup-card .ask-input-row input:focus { border-color: var(--accent); }
.ask-popup-card .ask-input-row .ask-send {
  background: var(--accent); color: #fff; border: none;
  border-radius: 50%; width: 36px; height: 36px;
  font-size: 16px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.ask-popup-card .ask-hint {
  font-size: 11px; color: var(--text3); margin-top: 8px; text-align: center;
}

/* 阅读内嵌聊天面板 */
.reader-reply {
  display: none;
  position: fixed;
  bottom: 48px; left: 0; right: 0;
  z-index: 20;
  max-width: 600px;
  margin: 0 auto;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 12px 12px 0 0;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  max-height: 50vh;
  flex-direction: column;
}
.reader-reply.show { display: flex; }
.reader-reply-header {
  display: flex;
  align-items: center;
  padding: 10px 14px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.reader-reply-header .reply-title {
  flex: 1; font-size: 13px; font-weight: 600; color: var(--text);
}
.reader-reply-header .reply-close {
  background: none; border: none; font-size: 16px; color: var(--text3);
  cursor: pointer; padding: 2px 6px;
}
.reader-reply-msgs {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
/* 聊天气泡 - 和 chat.html 一致 */
.rc-row { display: flex; gap: 8px; max-width: 88%; margin-bottom: 2px; align-items: flex-start; }
.rc-row.user { align-self: flex-end; flex-direction: row-reverse; }
.rc-row.assistant { align-self: flex-start; }
.rc-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; margin-top: 2px; }
.rc-body { display: flex; flex-direction: column; min-width: 0; }
.rc-row.user .rc-body { align-items: flex-end; }
.rc-row.assistant .rc-body { align-items: flex-start; }
.rc-name { font-size: 10px; margin: 0 4px 2px; }
.rc-row.user .rc-name { color: var(--accent); }
.rc-row.assistant .rc-name { color: #2f812f; }
.rc-row.connor .rc-name { color: #5b8af7; }
.rc-row.connor { align-self: flex-start; }
.rc-bubble { padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.65; word-break: break-word; color: #1a1a1a; }
.rc-row.user .rc-bubble { background: linear-gradient(145deg, #e7cece, #e7cece); border-bottom-right-radius: 4px; border: 1px solid rgba(248,187,208,0.5); }
.rc-row.assistant .rc-bubble { background: linear-gradient(145deg, #bccbbb, #bccbbb); border-bottom-left-radius: 4px; border: 1px solid rgba(165,214,140,0.5); }
.rc-row.connor .rc-bubble { background: linear-gradient(145deg, #c4d4f0, #c4d4f0); border-bottom-left-radius: 4px; border: 1px solid rgba(140,170,214,0.5); }
.rc-bubble.thinking { color: var(--text3); font-size: 13px; }
.rc-divider { text-align: center; font-size: 11px; color: var(--text3); margin: 6px 0; padding: 2px 0; border-top: 1px dashed var(--border); }
/* 底部输入框 */
.reader-reply-input {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px 10px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.reader-reply-input input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  font-size: 13px;
  background: var(--surface2);
  color: var(--text);
  outline: none;
}
.reader-reply-input input:focus { border-color: var(--accent); }
.reader-reply-input .rc-send {
  background: var(--accent); color: #fff; border: none;
  border-radius: 50%; width: 32px; height: 32px;
  font-size: 14px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.reader-reply-input .rc-send:disabled { opacity: 0.5; cursor: default; }

/* 底部章节导航 */
.reader-footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 10px 16px;
  background: rgba(255,249,245,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 10;
  max-width: 600px;
  margin: 0 auto;
}
.reader-footer button {
  background: none; border: none; color: var(--accent);
  font-size: 14px; font-weight: 500; cursor: pointer; padding: 8px 16px;
}
.reader-footer button:disabled { color: var(--text3); cursor: default; }
.reader-footer .ch-progress { font-size: 12px; color: var(--text2); }

/* 目录面板 */
.toc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 40;
  background: rgba(0,0,0,0.4);
}
.toc-overlay.show { display: block; }
.toc-panel {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: 280px;
  max-width: 80vw;
  background: var(--surface);
  z-index: 41;
  overflow-y: auto;
  padding: 16px;
  animation: slideRight 0.2s ease-out;
}
@keyframes slideRight { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.toc-panel h3 { font-size: 16px; margin-bottom: 12px; }
.toc-item {
  padding: 10px 8px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toc-item:hover { background: var(--surface2); border-radius: 6px; }
.toc-item.current { color: var(--accent); font-weight: 600; }
.toc-item .toc-status {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.toc-item .toc-status.has-anno { background: #66bb6a; }
.toc-item .toc-status.no-anno { background: var(--border); }
</style>
</head>
<body>

<div class="sub-page">

  <!-- =========== 书库视图 =========== -->
  <div id="libraryView" class="library-view">
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">‹</button>
      <h2>📚 陪伴阅读</h2>
    </div>
    <div class="page-content">
      <!-- 上传区域 -->
      <div class="upload-area" id="uploadArea" onclick="$('fileInput').click()">
        <input type="file" id="fileInput" accept=".epub" onchange="handleUpload(this.files[0])">
        <div class="upload-icon">📖</div>
        <div class="upload-text">点击或拖拽 EPUB 文件到此处导入</div>
      </div>
      <!-- 书籍列表 -->
      <div class="book-list" id="bookList"></div>
    </div>
  </div>

  <!-- =========== 阅读器视图 =========== -->
  <div id="readerView" class="reader-view" style="display:none; flex-direction:column; height:100dvh;">
    <!-- 顶栏：返回 + 标题 + 邀请共读 + 目录 -->
    <div class="reader-topbar">
      <button class="back-reader" onclick="closeReader()">‹</button>
      <span class="chapter-title" id="chapterTitle">-</span>
      <button class="invite-btn" id="inviteBtn" onclick="inviteRead()">📝 共读</button>
      <button class="topbar-icon-btn" onclick="toggleTOC()">☰</button>
    </div>
    <!-- 批注状态条 -->
    <div class="segment-status" id="segmentStatus"></div>
    <!-- 内容 -->
    <div class="reader-content" id="readerContent" onscroll="onReaderScroll()"></div>
    <!-- 底部：章节导航 -->
    <div class="reader-footer">
      <button id="prevChBtn" onclick="prevChapter()">‹ 上一章</button>
      <span class="ch-progress" id="chProgress">-</span>
      <button id="nextChBtn" onclick="nextChapter()">下一章 ›</button>
    </div>
  </div>

</div>

<!-- 高亮详情弹窗 -->
<div class="hl-popup" id="hlPopup" onclick="if(event.target===this)closeHlPopup()">
  <div class="hl-popup-card">
    <div class="hl-quote" id="hlPopupQuote"></div>
    <div class="hl-question" id="hlPopupQuestion"></div>
    <div class="hl-answer" id="hlPopupAnswer"></div>
    <div class="hl-actions">
      <button class="hl-delete-btn" id="hlDeleteBtn" onclick="deleteCurrentHighlight()">🗑 删除标注</button>
      <button class="hl-close-btn" onclick="closeHlPopup()">关闭</button>
    </div>
  </div>
</div>

<!-- 批注弹窗 -->
<div class="anno-popup" id="annoPopup" onclick="closeAnnoPopup(event)">
  <div class="anno-popup-card" id="annoPopupCard">
    <div class="anno-type" id="annoPopupType"></div>
    <div class="anno-text" id="annoPopupText"></div>
    <div class="anno-close"><button onclick="closeAnnoPopup()">关闭</button></div>
  </div>
</div>

<!-- 选中文字浮动工具栏 -->
<div class="sel-toolbar" id="selToolbar">
  <button id="selAskAionBtn" onclick="askAIAboutSelection('aion')">💬 问AI</button>
  <button id="selAskConnorBtn" class="connor-btn" onclick="askAIAboutSelection('connor')">💬 问第二位AI</button>
  <button id="selAskGroupBtn" class="group-btn" onclick="askAIAboutSelection('group')">💬 群里聊</button>
</div>

<!-- 提问弹窗 -->
<div class="ask-popup" id="askPopup" onclick="if(event.target===this)closeAskPopup()">
  <div class="ask-popup-card">
    <div class="ask-quote" id="askQuote"></div>
    <div class="ask-input-row">
      <input type="text" id="askInput" placeholder="想问点什么？（可留空）" onkeydown="if(event.key==='Enter')submitAskToChat()">
      <button class="ask-send" onclick="submitAskToChat()">↑</button>
    </div>
    <div class="ask-hint">消息会发送到对应聊天窗口</div>
  </div>
</div>

<!-- 阅读内嵌聊天面板 -->
<div class="reader-reply" id="readerReply">
  <div class="reader-reply-header">
    <span class="reply-title" id="replyTitle">💬 聊天</span>
    <button class="reply-close" onclick="closeReplyPanel()">✕</button>
  </div>
  <div class="reader-reply-msgs" id="replyMsgs"></div>
  <div class="reader-reply-input">
    <input type="text" id="replyInput" placeholder="继续聊..." onkeydown="if(event.key==='Enter')sendReplyMsg()">
    <button class="rc-send" id="replySendBtn" onclick="sendReplyMsg()">↑</button>
  </div>
</div>

<!-- 目录面板 -->
<div class="toc-overlay" id="tocOverlay" onclick="toggleTOC()"></div>
<div class="toc-panel" id="tocPanel" style="display:none;">
  <h3>📖 目录</h3>
  <div id="tocList"></div>
</div>

<script src="/static/common.js"></script>
<script>
/* ======================================================
   陪伴阅读 — Phase 1：书库 + 阅读器 + 进度保存
   ====================================================== */

// ── 状态 ──
let currentBook = null;     // {book_id, title, ...}
let currentChapters = [];   // 目录数据 [{chapter_index, title, ...}]
let currentChIdx = 0;       // 当前章节
let chapterData = null;     // 当前章节详细数据
let saveProgressTimer = null;
let aiName = 'AI';          // AI 名字，从章节 API 获取
let userName = '你';         // 用户名字
let connorName = 'Connor';  // Connor 名字
let askTarget = 'aion';     // 当前提问目标：'aion' | 'connor' | 'group'

// ── 初始化 ──
connectCommonWS();
loadLibrary();
setupDragDrop();

// ── 书库 ────────────────────────────────────
async function loadLibrary() {
  const res = await api('GET', '/api/books');
  const list = $('bookList');
  if (!res.books || res.books.length === 0) {
    list.innerHTML = '<div class="list-empty">还没有书~<br>上传一本 EPUB 开始阅读吧</div>';
    return;
  }
  list.innerHTML = res.books.map(b => {
    const cover = b.cover_path
      ? `<img src="${escHtml(b.cover_path)}" alt="封面">`
      : '<span class="no-cover">📚</span>';
    const progress = b.current_chapter > 0
      ? `读到第 ${b.current_chapter + 1}/${b.total_chapters} 章`
      : `共 ${b.total_chapters} 章`;
    return `
      <div class="book-card" onclick="openBook('${b.book_id}')">
        <div class="book-cover">${cover}</div>
        <div class="book-info">
          <div class="book-title">${escHtml(b.title)}</div>
          <div class="book-author">${escHtml(b.author)}</div>
          <div class="book-meta">${progress}</div>
        </div>
        <button class="book-delete" onclick="event.stopPropagation(); deleteBook('${b.book_id}', '${escHtml(b.title)}')" title="删除">✕</button>
      </div>`;
  }).join('');
}

// ── 上传 ────────────────────────────────────
async function handleUpload(file) {
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.epub')) {
    showToast('只支持 EPUB 格式哦');
    return;
  }
  const area = $('uploadArea');
  area.classList.add('uploading');
  area.querySelector('.upload-text').textContent = '正在解析...';

  const form = new FormData();
  form.append('file', file);
  try {
    const res = await fetch('/api/books/upload', { method: 'POST', body: form });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '上传失败');
    showToast(`《${data.title}》导入成功！`);
    loadLibrary();
  } catch(e) {
    showToast('导入失败: ' + e.message);
  } finally {
    area.classList.remove('uploading');
    area.querySelector('.upload-text').textContent = '点击或拖拽 EPUB 文件到此处导入';
    $('fileInput').value = '';
  }
}

function setupDragDrop() {
  const area = $('uploadArea');
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleUpload(file);
  });
}

// ── 删除书籍 ──
async function deleteBook(bookId, title) {
  if (!confirm(`确认删除《${title}》？\n书籍数据和批注将全部清除。`)) return;
  await api('DELETE', `/api/books/${bookId}`);
  showToast('已删除');
  loadLibrary();
}

// ── 打开书籍 ────────────────────────────────
async function openBook(bookId) {
  const res = await api('GET', `/api/books/${bookId}`);
  if (!res.book) { showToast('书籍不存在'); return; }

  currentBook = res.book;
  currentChapters = res.chapters;

  // 切换视图
  $('libraryView').style.display = 'none';
  $('readerView').style.display = 'flex';

  // 跳到上次阅读位置
  const startCh = currentBook.current_chapter || 0;
  await loadChapter(startCh);

  // 恢复段落滚动位置
  if (currentBook.current_paragraph > 0) {
    setTimeout(() => {
      const el = document.querySelector(`[data-p="${currentBook.current_paragraph}"]`);
      if (el) el.scrollIntoView({ block: 'start' });
    }, 100);
  }
}

// ── 关闭阅读器 ──
function closeReader() {
  saveProgress();
  $('libraryView').style.display = 'block';
  $('readerView').style.display = 'none';
  currentBook = null;
  chapterData = null;
  loadLibrary();
}

// ── 加载章节 ────────────────────────────────
async function loadChapter(chIdx) {
  if (!currentBook || chIdx < 0 || chIdx >= currentBook.total_chapters) return;
  currentChIdx = chIdx;

  const res = await api('GET', `/api/books/${currentBook.book_id}/chapters/${chIdx}`);
  chapterData = res;
  if (res.ai_name) aiName = res.ai_name;
  if (res.user_name) userName = res.user_name;
  if (res.connor_name) connorName = res.connor_name;

  // 标题 + 字数
  const title = res.chapter.title || `第 ${chIdx + 1} 章`;
  const charCount = res.chapter.char_count || 0;
  $('chapterTitle').innerHTML = escHtml(title) + `<span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:6px;">${charCount}字</span>`;
  $('chProgress').textContent = `${chIdx + 1} / ${currentBook.total_chapters}`;

  // 导航按钮
  $('prevChBtn').disabled = chIdx <= 0;
  $('nextChBtn').disabled = chIdx >= currentBook.total_chapters - 1;

  // 渲染批注状态条
  renderSegmentStatus(res.chapter.segments_meta);

  // 渲染内容
  renderChapter(res);

  // 应用用户高亮
  if (res.highlights && res.highlights.length > 0) {
    applyHighlights(res.highlights);
  }

  // 滚动到顶部
  $('readerContent').scrollTop = 0;

  // 保存进度
  currentBook.current_chapter = chIdx;
  saveProgress();
}

function renderSegmentStatus(segments) {
  const bar = $('segmentStatus');
  if (!segments || segments.length === 0) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  const doneCount = segments.filter(s => s.status === 'done').length;
  bar.innerHTML = segments.map(s =>
    `<div class="seg-block ${s.status}"></div>`
  ).join('') +
    `<span class="seg-label">${doneCount}/${segments.length} 段已批注</span>`;
}

function renderChapter(data) {
  const content = $('readerContent');
  const ch = data.chapter;
  const annotations = data.annotations || {};
  const connorAnnotations = data.connor_annotations || {};
  const summaries = data.summaries || [];
  const connorSummaries = data.connor_summaries || [];

  // 直接使用后端生成的 HTML（已含 data-p 标记和图片）
  let html = ch.html_content || '';

  // 为有批注的段落添加气泡（Aion + Connor）
  const allAnnotatedPs = new Set([...Object.keys(annotations), ...Object.keys(connorAnnotations)]);
  for (const pIdx of allAnnotatedPs) {
    const marker = `data-p="${pIdx}"`;
    let bubbles = '';
    if (annotations[pIdx]) {
      bubbles += `<span class="anno-bubble" onclick="showAnnotation(${pIdx},'aion')" title="${escHtml(aiName)}的批注"><img src="/public/AIIcon.png" alt=""></span>`;
    }
    if (connorAnnotations[pIdx]) {
      bubbles += `<span class="anno-bubble connor" onclick="showAnnotation(${pIdx},'connor')" title="${escHtml(connorName)}的批注"><img src="/public/codexicon.png" alt=""></span>`;
    }
    if (bubbles) {
      html = html.replace(
        new RegExp(`(<p\\s+${marker}>)(.*?)(</p>)`, 's'),
        `$1$2${bubbles}$3`
      );
    }
  }

  // 在每段（segment）末尾插入读后感按钮
  const segmentsMeta = ch.segments_meta || [];
  for (const s of summaries) {
    const segMeta = segmentsMeta[s.segment_index];
    if (!segMeta) continue;
    const endP = segMeta.end_p;
    const endMarker = `data-p="${endP}"`;
    const summaryBtn = `<div style="text-align:center; margin:16px 0;"><button class="summary-btn" onclick="showSummary(${s.segment_index},'aion')">📋 ${escHtml(aiName)}读后感</button></div>`;
    html = html.replace(
      new RegExp(`(<p\\s+${endMarker}>.*?</p>)`, 's'),
      `$1${summaryBtn}`
    );
  }
  for (const s of connorSummaries) {
    const segMeta = segmentsMeta[s.segment_index];
    if (!segMeta) continue;
    const endP = segMeta.end_p;
    const endMarker = `data-p="${endP}"`;
    const summaryBtn = `<div style="text-align:center; margin:16px 0;"><button class="summary-btn" style="border-color:#5b8af7;color:#5b8af7;" onclick="showSummary(${s.segment_index},'connor')">📋 ${escHtml(connorName)}读后感</button></div>`;
    // 插在已有内容后面（data-p 可能已被替换添加了 Aion 的按钮，追加到 p 后）
    const existingPattern = new RegExp(`(<p\\s+${endMarker}>.*?</p>(?:\\s*<div[^>]*>.*?</div>)*)`, 's');
    html = html.replace(existingPattern, `$1${summaryBtn}`);
  }

  content.innerHTML = html;
}

// ── 批注弹窗 ──
function showAnnotation(pIdx, who) {
  if (!chapterData) return;
  const annoMap = who === 'connor' ? (chapterData.connor_annotations || {}) : (chapterData.annotations || {});
  const anno = annoMap[pIdx];
  if (!anno) return;
  const name = who === 'connor' ? connorName : aiName;
  const typeLabel = `【${name}】${anno.type || '批注'}`;
  $('annoPopupType').textContent = typeLabel;

  // 解析 [MUSIC:xxx]
  const musicRe = /\[MUSIC:(.+?)\]/g;
  let text = anno.text || '';
  let musicMatches = [];
  let m;
  while ((m = musicRe.exec(text)) !== null) {
    musicMatches.push(m[1]);
  }
  // 替换文本中的 [MUSIC:xxx]
  let cleanText = text.replace(musicRe, '').trim();
  $('annoPopupText').innerHTML = escHtml(cleanText);

  // 添加音乐卡片
  for (const keyword of musicMatches) {
    const card = document.createElement('div');
    card.className = 'anno-music-card';
    card.innerHTML = `<span class="music-icon">🎵</span><span class="music-text">${escHtml(name)}点播了歌曲：${escHtml(keyword)}</span><span class="music-play">▶ 播放</span>`;
    card.onclick = () => playMusicByKeyword(keyword);
    $('annoPopupText').appendChild(card);
  }

  $('annoPopup').classList.add('show');
}

async function playMusicByKeyword(keyword) {
  try {
    const res = await api('GET', `/api/music/search?q=${encodeURIComponent(keyword)}&limit=1`);
    if (res.songs && res.songs.length > 0) {
      playMusicOnline(res.songs[0].id);
    } else {
      showToast('没找到这首歌，试试其他关键词吧');
    }
  } catch(e) {
    showToast('音乐搜索失败');
  }
}

function playMusicOnline(songId) {
  let wrap = document.getElementById('globalMusicWrap');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'globalMusicWrap';
    wrap.style.cssText = 'position:fixed;top:max(34px, env(safe-area-inset-top, 0px));left:0;right:0;z-index:999;display:none;align-items:center;gap:8px;background:var(--surface);padding:0 12px;height:36px;box-shadow:0 2px 8px rgba(0,0,0,0.15);border-bottom:1px solid var(--border);';

    const playBtn = document.createElement('button');
    playBtn.id = 'globalMusicPlayBtn';
    playBtn.textContent = '⏸';
    playBtn.style.cssText = 'background:none;border:none;font-size:16px;cursor:pointer;color:var(--text);padding:0 4px;line-height:1;flex-shrink:0;';

    const bar = document.createElement('input');
    bar.id = 'globalMusicBar';
    bar.type = 'range'; bar.min = 0; bar.max = 1000; bar.value = 0;
    bar.style.cssText = 'flex:1;height:4px;accent-color:var(--accent);cursor:pointer;';

    const audio = document.createElement('audio');
    audio.id = 'globalMusicAudio';

    playBtn.onclick = () => { if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; } else { audio.pause(); playBtn.textContent = '▶'; } };
    audio.ontimeupdate = () => { if (audio.duration) bar.value = (audio.currentTime / audio.duration) * 1000; };
    bar.oninput = () => { if (audio.duration) audio.currentTime = (bar.value / 1000) * audio.duration; };
    audio.onended = () => { wrap.style.display = 'none'; playBtn.textContent = '▶'; };
    audio.onplay = () => { playBtn.textContent = '⏸'; };
    audio.onpause = () => { if (!audio.ended) playBtn.textContent = '▶'; };

    const closeBtn = document.createElement('button');
    closeBtn.textContent = '✕';
    closeBtn.style.cssText = 'background:none;border:none;font-size:14px;cursor:pointer;color:var(--text3);padding:0 4px;line-height:1;flex-shrink:0;';
    closeBtn.onclick = () => { audio.pause(); audio.src = ''; wrap.style.display = 'none'; bar.value = 0; };

    wrap.appendChild(playBtn);
    wrap.appendChild(bar);
    wrap.appendChild(audio);
    wrap.appendChild(closeBtn);
    document.body.appendChild(wrap);
  }
  const audio = document.getElementById('globalMusicAudio');
  audio.src = '/api/music/stream/' + songId;
  wrap.style.display = 'flex';
  document.getElementById('globalMusicBar').value = 0;
  document.getElementById('globalMusicPlayBtn').textContent = '⏸';
  audio.play().catch(() => {});
}

function showSummary(segIdx, who) {
  if (!chapterData) return;
  const summaryList = who === 'connor' ? (chapterData.connor_summaries || []) : (chapterData.summaries || []);
  const entry = summaryList.find(s => s.segment_index === segIdx);
  if (!entry) return;
  const name = who === 'connor' ? connorName : aiName;
  $('annoPopupType').textContent = `📋 ${name}读后感`;
  $('annoPopupText').textContent = entry.summary;
  $('annoPopup').classList.add('show');
}

function closeAnnoPopup(e) {
  if (e && e.target.id !== 'annoPopup') return;
  $('annoPopup').classList.remove('show');
}

// ── 章节导航 ──
function prevChapter() { loadChapter(currentChIdx - 1); }
function nextChapter() { loadChapter(currentChIdx + 1); }

// ── 目录面板 ──
function toggleTOC() {
  const overlay = $('tocOverlay');
  const panel = $('tocPanel');
  const show = !overlay.classList.contains('show');
  overlay.classList.toggle('show', show);
  panel.style.display = show ? 'block' : 'none';
  if (show) renderTOC();
}

function renderTOC() {
  $('tocList').innerHTML = currentChapters.map(ch => {
    const isCurrent = ch.chapter_index === currentChIdx;
    const segments = ch.segments_meta || [];
    const hasAnno = segments.some(s => s.status === 'done');
    return `<div class="toc-item ${isCurrent ? 'current' : ''}"
                 onclick="loadChapter(${ch.chapter_index}); toggleTOC();">
      <span class="toc-status ${hasAnno ? 'has-anno' : 'no-anno'}"></span>
      ${escHtml(ch.title || '第 ' + (ch.chapter_index + 1) + ' 章')}
    </div>`;
  }).join('');
}

// ── 进度保存 ──
function onReaderScroll() {
  clearTimeout(saveProgressTimer);
  saveProgressTimer = setTimeout(saveProgress, 1500);
}

function saveProgress() {
  if (!currentBook) return;
  // 找当前屏幕最上方可见段落
  const paragraphs = $('readerContent').querySelectorAll('[data-p]');
  const containerTop = $('readerContent').scrollTop;
  let visibleP = 0;
  for (const p of paragraphs) {
    if (p.offsetTop >= containerTop) {
      visibleP = parseInt(p.dataset.p) || 0;
      break;
    }
  }
  api('PUT', `/api/books/${currentBook.book_id}/progress`, {
    chapter: currentChIdx,
    paragraph: visibleP
  });
}

// ── 邀请共读 — AI 批注 ──────────────────────
let isAnnotating = false;

function inviteRead() {
  if (!currentBook || !chapterData) return;
  if (isAnnotating) { showToast('正在批注中，请稍候...'); return; }

  const segments = chapterData.chapter.segments_meta || [];
  if (segments.length === 0) { showToast('当前章节无可批注内容'); return; }

  // 开始批注所有段
  startAnnotateAll(segments);
}

async function startAnnotateAll(segments) {
  isAnnotating = true;
  const btn = $('inviteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> AI 正在读...';

  const total = segments.length;
  let doneCount = 0;

  try {
    // 获取主聊天当前使用的模型，批注跟主聊天同步
    let modelKey = null;
    try {
      const convs = await api('GET', '/api/conversations');
      if (convs && convs.length > 0) modelKey = convs[0].model || null;
    } catch (e) { console.warn('获取聊天模型失败，使用默认模型', e); }

    const resp = await fetch(`/api/books/${currentBook.book_id}/chapters/${currentChIdx}/annotate-all`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model_key: modelKey })
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // 保留不完整的行

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;

        let msg;
        try { msg = JSON.parse(raw); } catch { continue; }

        if (msg.type === 'segment_start') {
          btn.innerHTML = `<span class="spinner"></span> ${msg.segment_index + 1}/${total} 段...`;
          // 更新状态条中对应段为 annotating
          updateSegBlockStatus(msg.segment_index, 'annotating');
        }
        else if (msg.type === 'segment_done') {
          doneCount++;
          // 合并 Aion 批注
          mergeAnnotations(msg.aion_annotations, msg.aion_summary, msg.segment_index);
          // 合并 Connor 批注
          if (msg.connor_annotations && msg.connor_annotations.length > 0) {
            mergeConnorAnnotations(msg.connor_annotations, msg.connor_summary, msg.segment_index);
          }
          updateSegBlockStatus(msg.segment_index, 'done');
          // 实时刷新阅读器内容
          renderChapter(chapterData);
        }
        else if (msg.type === 'segment_error') {
          showToast(`第 ${msg.segment_index + 1} 段${msg.who ? '(' + msg.who + ')' : ''}批注失败: ${msg.message}`);
          updateSegBlockStatus(msg.segment_index, 'not_sent');
        }
        else if (msg.type === 'start' && msg.connor_available === false) {
          showToast(`${connorName} 未接入，仅 ${aiName} 批注`);
        }
        else if (msg.type === 'done') {
          break;
        }
      }
    }

    if (doneCount > 0) {
      showToast(`批注完成！共 ${doneCount} 段`);
    } else {
      showToast('批注未生成，请重试');
    }

  } catch (e) {
    showToast('批注请求失败: ' + e.message);
  } finally {
    isAnnotating = false;
    btn.disabled = false;
    btn.innerHTML = '📝 共读';
    // 刷新状态条
    renderSegmentStatus(chapterData.chapter.segments_meta);
  }
}

function mergeAnnotations(newAnnos, summary, segIdx) {
  if (!chapterData) return;
  // 合并到 annotations map
  for (const a of (newAnnos || [])) {
    chapterData.annotations[a.p] = a;
  }
  // 合并摘要
  if (summary) {
    const existing = chapterData.summaries.findIndex(s => s.segment_index === segIdx);
    if (existing >= 0) {
      chapterData.summaries[existing].summary = summary;
    } else {
      chapterData.summaries.push({ segment_index: segIdx, summary });
    }
  }
  // 更新 segments_meta 状态
  const seg = chapterData.chapter.segments_meta[segIdx];
  if (seg) seg.status = 'done';
}

function mergeConnorAnnotations(newAnnos, summary, segIdx) {
  if (!chapterData) return;
  if (!chapterData.connor_annotations) chapterData.connor_annotations = {};
  if (!chapterData.connor_summaries) chapterData.connor_summaries = [];
  for (const a of (newAnnos || [])) {
    chapterData.connor_annotations[a.p] = a;
  }
  if (summary) {
    const existing = chapterData.connor_summaries.findIndex(s => s.segment_index === segIdx);
    if (existing >= 0) {
      chapterData.connor_summaries[existing].summary = summary;
    } else {
      chapterData.connor_summaries.push({ segment_index: segIdx, summary });
    }
  }
}

function updateSegBlockStatus(segIdx, status) {
  const blocks = $('segmentStatus').querySelectorAll('.seg-block');
  if (blocks[segIdx]) {
    blocks[segIdx].className = `seg-block ${status}`;
  }
  // 更新计数
  const allBlocks = $('segmentStatus').querySelectorAll('.seg-block');
  const doneN = [...allBlocks].filter(b => b.classList.contains('done')).length;
  const label = $('segmentStatus').querySelector('.seg-label');
  if (label) label.textContent = `${doneN}/${allBlocks.length} 段已批注`;
}

// ── 选中文字 → 跳转聊天窗口提问 ────────────────────
let selectedText = '';
let pendingHighlight = null;  // 待保存的选区信息

// 监听文字选择
document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  const toolbar = $('selToolbar');
  if (!sel || sel.isCollapsed || !sel.toString().trim()) {
    setTimeout(() => {
      if (!window.getSelection()?.toString().trim()) {
        toolbar.style.display = 'none';
      }
    }, 200);
    return;
  }

  const text = sel.toString().trim();
  if (text.length < 2) return;

  const readerContent = $('readerContent');
  const anchor = sel.anchorNode;
  if (!readerContent.contains(anchor)) return;

  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  const contentRect = readerContent.getBoundingClientRect();
  toolbar.style.display = 'block';
  toolbar.style.left = Math.min(
    Math.max(rect.left + rect.width / 2 - toolbar.offsetWidth / 2, contentRect.left),
    contentRect.right - toolbar.offsetWidth
  ) + 'px';
  toolbar.style.top = (rect.top - toolbar.offsetHeight - 8 + window.scrollY) + 'px';

  $('selAskAionBtn').textContent = `💬 问${aiName}`;
  $('selAskConnorBtn').textContent = `💬 问${connorName}`;
  selectedText = text;

  // 捕获选区位置信息，用于后续持久化高亮
  try {
    const startNode = range.startContainer;
    const endNode = range.endContainer;
    const startPEl = startNode.nodeType === 3
      ? startNode.parentElement.closest('[data-p]')
      : startNode.closest('[data-p]');
    const endPEl = endNode.nodeType === 3
      ? endNode.parentElement.closest('[data-p]')
      : endNode.closest('[data-p]');
    if (startPEl && endPEl) {
      pendingHighlight = {
        start_p: parseInt(startPEl.dataset.p),
        start_offset: calcTextOffset(startPEl, range.startContainer, range.startOffset),
        end_p: parseInt(endPEl.dataset.p),
        end_offset: calcTextOffset(endPEl, range.endContainer, range.endOffset),
        text: text
      };
    }
  } catch(e) { pendingHighlight = null; }
});

// 计算相对于段落元素的纯文本字符偏移
function calcTextOffset(pEl, container, offset) {
  const walker = document.createTreeWalker(pEl, NodeFilter.SHOW_TEXT, null);
  let charCount = 0;
  let node;
  while ((node = walker.nextNode())) {
    if (node === container) {
      return charCount + offset;
    }
    charCount += node.textContent.length;
  }
  return charCount + offset;
}

// 获取段落元素中所有文本节点的拼接内容
function getParagraphTextFromDOM(pEl) {
  const walker = document.createTreeWalker(pEl, NodeFilter.SHOW_TEXT, null);
  let text = '', node;
  while ((node = walker.nextNode())) text += node.textContent;
  return text;
}

// 在 DOM 段落中查找选中文字的位置（兜底方案，偏移量与 applyHighlights 一致）
function findHighlightInDOM(text) {
  if (!text) return null;
  const content = $('readerContent');
  if (!content) return null;
  const pEls = [...content.querySelectorAll('[data-p]')];
  if (!pEls.length) return null;

  // 单段落匹配
  for (const pEl of pEls) {
    const pText = getParagraphTextFromDOM(pEl);
    const idx = pText.indexOf(text);
    if (idx >= 0) {
      const pi = parseInt(pEl.dataset.p);
      return { start_p: pi, start_offset: idx, end_p: pi, end_offset: idx + text.length, text };
    }
  }

  // 跨段落匹配：拼接相邻段落文本
  for (let i = 0; i < pEls.length - 1; i++) {
    let combined = '';
    const pTexts = [];
    for (let j = i; j < Math.min(i + 6, pEls.length); j++) {
      const t = getParagraphTextFromDOM(pEls[j]);
      pTexts.push({ pi: parseInt(pEls[j].dataset.p), text: t, start: combined.length });
      combined += t;
      const idx = combined.indexOf(text);
      if (idx >= 0) {
        const endIdx = idx + text.length;
        let startP, startOff, endP, endOff;
        for (const pt of pTexts) {
          const ptEnd = pt.start + pt.text.length;
          if (idx >= pt.start && idx < ptEnd) {
            startP = pt.pi; startOff = idx - pt.start;
          }
          if (endIdx > pt.start && endIdx <= ptEnd) {
            endP = pt.pi; endOff = endIdx - pt.start;
          }
        }
        if (startP !== undefined && endP !== undefined) {
          return { start_p: startP, start_offset: startOff, end_p: endP, end_offset: endOff, text };
        }
      }
    }
  }
  return null;
}

function askAIAboutSelection(target) {
  if (!selectedText || !currentBook) return;
  askTarget = target || 'aion';

  // 如果 selectionchange 没捕获到位置信息，尝试从当前选区补捕
  if (!pendingHighlight) {
    try {
      const sel = window.getSelection();
      if (sel && !sel.isCollapsed && sel.rangeCount > 0) {
        const range = sel.getRangeAt(0);
        const sn = range.startContainer, en = range.endContainer;
        const sp = sn.nodeType === 3 ? sn.parentElement?.closest('[data-p]') : sn.closest?.('[data-p]');
        const ep = en.nodeType === 3 ? en.parentElement?.closest('[data-p]') : en.closest?.('[data-p]');
        if (sp && ep) {
          pendingHighlight = {
            start_p: parseInt(sp.dataset.p),
            start_offset: calcTextOffset(sp, range.startContainer, range.startOffset),
            end_p: parseInt(ep.dataset.p),
            end_offset: calcTextOffset(ep, range.endContainer, range.endOffset),
            text: selectedText
          };
        }
      }
    } catch(e) {}
  }

  // 兜底：在 DOM 中搜索选中文本
  if (!pendingHighlight) {
    pendingHighlight = findHighlightInDOM(selectedText);
  }

  $('selToolbar').style.display = 'none';
  // 显示提问弹窗
  const quote = selectedText.length > 200 ? selectedText.slice(0, 200) + '...' : selectedText;
  $('askQuote').textContent = quote;
  $('askInput').value = '';
  const targetLabel = askTarget === 'connor' ? connorName : askTarget === 'group' ? '群聊' : aiName;
  $('askPopup').classList.add('show');
  $('askInput').placeholder = `问${targetLabel}点什么？（可留空）`;
  $('askInput').focus();
}

function closeAskPopup() {
  $('askPopup').classList.remove('show');
}

function closeReplyPanel() {
  $('readerReply').classList.remove('show');
}

let replyConvId = null;
let replyConnorRoomId = null;
let replyGroupRoomId = null;
let replySending = false;

// 渲染一条聊天气泡
function renderChatBubble(role, content, who) {
  const isUser = role === 'user';
  let name, avatar, rowClass;
  if (isUser) {
    name = userName;
    avatar = '/public/UserIcon.png';
    rowClass = 'user';
  } else if (who === 'connor') {
    name = connorName;
    avatar = '/public/codexicon.png';
    rowClass = 'connor';
  } else {
    name = aiName;
    avatar = '/public/AIIcon.png';
    rowClass = 'assistant';
  }
  // 把文本按双换行分段，多段各自一个气泡
  const parts = content.split(/\n{2,}/).filter(p => p.trim());
  const bubbles = parts.length > 1
    ? parts.map(p => `<div class="rc-bubble">${escHtml(p).replace(/\n/g, '<br>')}</div>`).join('')
    : `<div class="rc-bubble">${escHtml(content).replace(/\n/g, '<br>')}</div>`;
  return `<div class="rc-row ${rowClass}">
    <img class="rc-avatar" src="${avatar}" alt="">
    <div class="rc-body">
      <div class="rc-name">${escHtml(name)}</div>
      ${bubbles}
    </div>
  </div>`;
}

// 加载最近聊天上下文并打开面板
async function openReplyPanel() {
  const targetLabel = askTarget === 'connor' ? connorName : askTarget === 'group' ? '群聊' : aiName;
  $('replyTitle').textContent = `💬 ${targetLabel}`;

  // 根据目标获取 room/conv ID
  if (askTarget === 'aion') {
    if (!replyConvId) {
      try {
        const convs = await api('GET', '/api/conversations');
        if (convs && convs.length > 0) replyConvId = convs[0].id;
      } catch(e) {}
    }
    if (!replyConvId) {
      showToast('没有可用的对话，请先在聊天页创建一个');
      return false;
    }
  } else {
    // 获取 chatroom rooms
    try {
      const rooms = await api('GET', '/api/chatroom/rooms');
      if (rooms) {
        for (const r of rooms) {
          if (r.type === 'connor_1v1' && !replyConnorRoomId) replyConnorRoomId = r.id;
          if (r.type === 'group' && !replyGroupRoomId) replyGroupRoomId = r.id;
        }
      }
    } catch(e) {}

    if (askTarget === 'connor' && !replyConnorRoomId) {
      showToast(`${connorName} 未接入，无法使用此功能`);
      return false;
    }
    if (askTarget === 'group' && !replyGroupRoomId) {
      showToast('群聊房间不存在，请先在聊天室创建');
      return false;
    }
  }

  // 加载最近消息作为上下文
  const msgs = $('replyMsgs');
  msgs.innerHTML = '';
  try {
    let history = [];
    if (askTarget === 'aion') {
      history = await api('GET', `/api/conversations/${replyConvId}/messages?limit=6`);
      if (history && history.length > 0) {
        const contextHtml = history
          .filter(m => m.role === 'user' || m.role === 'assistant')
          .map(m => renderChatBubble(m.role, m.role === 'assistant' ? cleanAiDisplay(m.content) : m.content))
          .join('');
        msgs.innerHTML = contextHtml + '<div class="rc-divider">── 以上为最近聊天 ──</div>';
      }
    } else {
      const roomId = askTarget === 'connor' ? replyConnorRoomId : replyGroupRoomId;
      const roomMsgs = await api('GET', `/api/chatroom/rooms/${roomId}/messages?limit=6`);
      if (roomMsgs && roomMsgs.length > 0) {
        const contextHtml = roomMsgs.map(m => {
          const role = m.sender === 'user' ? 'user' : m.sender;
          return renderChatBubble(role === 'user' ? 'user' : 'assistant', cleanAiDisplay(m.content), m.sender === 'connor' ? 'connor' : undefined);
        }).join('');
        msgs.innerHTML = contextHtml + '<div class="rc-divider">── 以上为最近聊天 ──</div>';
      }
    }
  } catch(e) {}

  $('replyInput').value = '';
  $('readerReply').classList.add('show');
  // 滚动到底部
  setTimeout(() => { msgs.scrollTop = msgs.scrollHeight; }, 50);
  return true;
}

async function submitAskToChat() {
  const question = $('askInput').value.trim();
  closeAskPopup();

  // 拼装消息内容
  const bookTitle = currentBook.title || '未知';
  const chTitle = chapterData?.chapter?.title || `第 ${currentChIdx + 1} 章`;
  const sel = selectedText.length > 500 ? selectedText.slice(0, 500) + '...' : selectedText;

  // 保存当前提问信息，用于AI回复后保存高亮
  const askQuestion = question || '你觉得这段怎么样？';
  // 三重保险获取高亮位置信息
  let askHighlightInfo = pendingHighlight ? { ...pendingHighlight } : findHighlightInDOM(selectedText);
  if (!askHighlightInfo) {
    console.warn('[highlight] 无法定位选中文字位置, selectedText:', selectedText?.slice(0, 50));
  }

  let msgContent = `我在读《${bookTitle}》「${chTitle}」，看到这段话：\n「${sel}」`;
  if (question) {
    msgContent += `\n${question}`;
  } else {
    msgContent += `\n你觉得这段怎么样？`;
  }

  // 先打开面板、加载上下文，再发送
  const ok = await openReplyPanel();
  if (!ok) return;

  // 预览用户即将发送的内容（带分割线）
  const msgs = $('replyMsgs');
  msgs.insertAdjacentHTML('beforeend', renderChatBubble('user', msgContent));
  msgs.scrollTop = msgs.scrollHeight;

  // 弹出面板让用户先看上下文 + 自己的消息
  await new Promise(r => setTimeout(r, 100));

  // 发送消息
  await doSendInPanel(msgContent, true, { highlightInfo: askHighlightInfo, question: askQuestion, selectedText: sel });
}

// 面板内继续追问
async function sendReplyMsg() {
  const input = $('replyInput');
  const text = input.value.trim();
  if (!text || replySending) return;
  // 检查目标是否有效
  if (askTarget === 'aion' && !replyConvId) return;
  if (askTarget === 'connor' && !replyConnorRoomId) return;
  if (askTarget === 'group' && !replyGroupRoomId) return;
  input.value = '';
  await doSendInPanel(text);
}

// 清理 AI 回复中的指令标签（只保留可读文字）
function cleanAiDisplay(text) {
  return text.replace(/\[MUSIC:[^\]]*\]/g, '').replace(/\[CAM_CHECK\]/g, '').replace(/\[ALARM:[^\]]*\]/g, '').replace(/\[REMINDER:[^\]]*\]/g, '').trim();
}

// 把 AI 回复渲染成多气泡（按双换行分段）
function renderAiBubbles(aiBody, displayText) {
  const parts = displayText.split(/\n{2,}/).filter(p => p.trim());
  // 清除旧气泡
  aiBody.querySelectorAll('.rc-bubble').forEach(e => e.remove());
  if (parts.length > 1) {
    parts.forEach(p => {
      const b = document.createElement('div');
      b.className = 'rc-bubble';
      b.innerHTML = escHtml(p).replace(/\n/g, '<br>');
      aiBody.appendChild(b);
    });
  } else {
    const b = document.createElement('div');
    b.className = 'rc-bubble';
    b.innerHTML = escHtml(displayText).replace(/\n/g, '<br>');
    aiBody.appendChild(b);
  }
}

// 实际调用 send API 并流式渲染
// skipUserBubble: 若为 true 则不再重复添加用户气泡（已由调用方添加）
async function doSendInPanel(msgContent, skipUserBubble, highlightMeta) {
  replySending = true;
  $('replySendBtn').disabled = true;

  const msgs = $('replyMsgs');

  // 添加用户气泡
  if (!skipUserBubble) {
    msgs.insertAdjacentHTML('beforeend', renderChatBubble('user', msgContent));
  }

  let fullReply = '';
  let connorReply = '';

  if (askTarget === 'aion') {
    // ── Aion 私聊模式 ──
    const aiRow = document.createElement('div');
    aiRow.className = 'rc-row assistant';
    aiRow.innerHTML = `
      <img class="rc-avatar" src="/public/AIIcon.png" alt="">
      <div class="rc-body">
        <div class="rc-name">${escHtml(aiName)}</div>
        <div class="rc-bubble thinking">正在思考...</div>
      </div>`;
    msgs.appendChild(aiRow);
    msgs.scrollTop = msgs.scrollHeight;
    const aiBody = aiRow.querySelector('.rc-body');

    try {
      const resp = await fetch(`/api/conversations/${replyConvId}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: msgContent, context_limit: 30 })
      });
      fullReply = await _streamToBody(resp, aiBody, msgs);
    } catch(e) {
      _showError(aiBody, e.message);
    }

  } else if (askTarget === 'connor') {
    // ── Connor 1v1 模式 ──
    const cRow = document.createElement('div');
    cRow.className = 'rc-row connor';
    cRow.innerHTML = `
      <img class="rc-avatar" src="/public/codexicon.png" alt="">
      <div class="rc-body">
        <div class="rc-name">${escHtml(connorName)}</div>
        <div class="rc-bubble thinking">正在思考...</div>
      </div>`;
    msgs.appendChild(cRow);
    msgs.scrollTop = msgs.scrollHeight;
    const cBody = cRow.querySelector('.rc-body');

    try {
      const resp = await fetch(`/api/chatroom/rooms/${replyConnorRoomId}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: msgContent })
      });
      fullReply = await _streamChatroomToBody(resp, null, cBody, msgs);
    } catch(e) {
      _showError(cBody, e.message);
    }

  } else {
    // ── 群聊模式：两个 AI 都会回复 ──
    const aRow = document.createElement('div');
    aRow.className = 'rc-row assistant';
    aRow.innerHTML = `
      <img class="rc-avatar" src="/public/AIIcon.png" alt="">
      <div class="rc-body">
        <div class="rc-name">${escHtml(aiName)}</div>
        <div class="rc-bubble thinking">正在思考...</div>
      </div>`;
    msgs.appendChild(aRow);
    const aBody = aRow.querySelector('.rc-body');

    const cRow = document.createElement('div');
    cRow.className = 'rc-row connor';
    cRow.innerHTML = `
      <img class="rc-avatar" src="/public/codexicon.png" alt="">
      <div class="rc-body">
        <div class="rc-name">${escHtml(connorName)}</div>
        <div class="rc-bubble thinking">等待中...</div>
      </div>`;
    msgs.appendChild(cRow);
    const cBody = cRow.querySelector('.rc-body');
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const resp = await fetch(`/api/chatroom/rooms/${replyGroupRoomId}/send`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: msgContent })
      });
      const results = await _streamChatroomToBody(resp, aBody, cBody, msgs);
      fullReply = results.aion || '';
      connorReply = results.connor || '';
    } catch(e) {
      _showError(aBody, e.message);
    }
  }

  replySending = false;
  $('replySendBtn').disabled = false;
  $('replyInput').focus();

  // AI 回复完成后，保存高亮
  if (highlightMeta && highlightMeta.highlightInfo && (fullReply || connorReply) && currentBook) {
    try {
      const hl = highlightMeta.highlightInfo;
      const res = await api('POST', `/api/books/${currentBook.book_id}/chapters/${currentChIdx}/highlights`, {
        selected_text: highlightMeta.selectedText,
        start_p: hl.start_p,
        start_offset: hl.start_offset,
        end_p: hl.end_p,
        end_offset: hl.end_offset,
        question: highlightMeta.question,
        answer: fullReply,
        annotator: askTarget,
        connor_answer: connorReply
      });
      if (res && res.id) {
        // 将新高亮加入当前数据并立即应用
        const newHl = {
          id: res.id,
          selected_text: highlightMeta.selectedText,
          start_p: hl.start_p, start_offset: hl.start_offset,
          end_p: hl.end_p, end_offset: hl.end_offset,
          question: highlightMeta.question,
          answer: fullReply,
          annotator: askTarget,
          connor_answer: connorReply,
          created_at: Date.now() / 1000
        };
        if (!chapterData.highlights) chapterData.highlights = [];
        chapterData.highlights.push(newHl);
        applyHighlights([newHl]);
      }
    } catch(e) { showToast('保存标注失败: ' + e.message); }
    pendingHighlight = null;
  }
}

// 流式读取 Aion 私聊 SSE 并渲染到 body
async function _streamToBody(resp, body, msgs) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullReply = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw) continue;
      let msg;
      try { msg = JSON.parse(raw); } catch { continue; }

      if (msg.type === 'chunk') {
        fullReply += msg.content;
        const display = cleanAiDisplay(fullReply);
        renderAiBubbles(body, display);
        msgs.scrollTop = msgs.scrollHeight;
      } else if (msg.type === 'music') {
        if (msg.cards && msg.cards.length) {
          playMusicOnline(msg.cards[0].id);
        }
      } else if (msg.type === 'error') {
        _showError(body, msg.message);
      }
    }
  }
  return fullReply;
}

// 流式读取 chatroom SSE 并渲染到对应 body
// aionBody 可为 null（Connor 1v1 时）
async function _streamChatroomToBody(resp, aionBody, connorBody, msgs) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let aionReply = '';
  let connorReply = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw) continue;
      let msg;
      try { msg = JSON.parse(raw); } catch { continue; }

      if (msg.type === 'aion_chunk' && aionBody) {
        aionReply += msg.content;
        renderAiBubbles(aionBody, cleanAiDisplay(aionReply));
        msgs.scrollTop = msgs.scrollHeight;
      } else if (msg.type === 'connor_chunk' && connorBody) {
        connorReply += msg.content;
        renderAiBubbles(connorBody, cleanAiDisplay(connorReply));
        msgs.scrollTop = msgs.scrollHeight;
      } else if (msg.type === 'connor_start' && connorBody) {
        // Connor 开始回复，更新提示
        const thinkBubble = connorBody.querySelector('.rc-bubble.thinking');
        if (thinkBubble) thinkBubble.textContent = '正在思考...';
      } else if (msg.type === 'aion_start' && aionBody) {
        const thinkBubble = aionBody.querySelector('.rc-bubble.thinking');
        if (thinkBubble) thinkBubble.textContent = '正在思考...';
      } else if (msg.type === 'error') {
        if (aionBody) _showError(aionBody, msg.message);
        else if (connorBody) _showError(connorBody, msg.message);
      }
    }
  }

  // Connor 1v1 模式只返回 connorReply
  if (!aionBody) return connorReply;
  // 群聊返回两个
  return { aion: aionReply, connor: connorReply };
}

function _showError(body, message) {
  body.querySelectorAll('.rc-bubble').forEach(e => e.remove());
  const errB = document.createElement('div');
  errB.className = 'rc-bubble';
  errB.textContent = '出错了: ' + message;
  body.appendChild(errB);
}

// ── 高亮持久化：应用橙色下划线 + 点击查看 ──────────────
function applyHighlights(highlights) {
  for (const hl of highlights) {
    try {
      const content = $('readerContent');
      // 找到所有涉及的段落
      for (let pi = hl.start_p; pi <= hl.end_p; pi++) {
        const pEl = content.querySelector(`[data-p="${pi}"]`);
        if (!pEl) continue;

        const walker = document.createTreeWalker(pEl, NodeFilter.SHOW_TEXT, null);
        let node, charPos = 0, ranges = [];

        // 确定本段落内的起止偏移
        const localStart = (pi === hl.start_p) ? hl.start_offset : 0;
        const localEnd = (pi === hl.end_p) ? hl.end_offset : Infinity;

        while ((node = walker.nextNode())) {
          const nodeLen = node.textContent.length;
          const nodeStart = charPos;
          const nodeEnd = charPos + nodeLen;

          // 检查是否与目标区间重叠
          if (nodeEnd > localStart && nodeStart < localEnd) {
            const rangeStart = Math.max(0, localStart - nodeStart);
            const rangeEnd = Math.min(nodeLen, localEnd - nodeStart);
            ranges.push({ node, start: rangeStart, end: rangeEnd });
          }
          charPos += nodeLen;
        }

        // 包裹文本节点（从后往前以避免偏移变化）
        for (let i = ranges.length - 1; i >= 0; i--) {
          const r = ranges[i];
          const range = document.createRange();
          range.setStart(r.node, r.start);
          range.setEnd(r.node, r.end);

          // surroundContents 在跨元素边界时会失败，用手动方式替代
          const span = document.createElement('span');
          span.className = 'user-hl';
          span.dataset.hlId = hl.id;
          span.onclick = function(e) {
            e.stopPropagation();
            showHighlightDetail(hl.id);
          };
          try {
            range.surroundContents(span);
          } catch(_) {
            // 降级：提取内容再包裹
            span.appendChild(range.extractContents());
            range.insertNode(span);
          }
        }
      }
    } catch(e) {
      console.warn('应用高亮失败', hl.id, e);
    }
  }
}

let currentHlId = null;
function showHighlightDetail(hlId) {
  if (!chapterData || !chapterData.highlights) return;
  const hl = chapterData.highlights.find(h => h.id === hlId);
  if (!hl) return;
  currentHlId = hlId;
  $('hlPopupQuote').textContent = hl.selected_text.length > 200
    ? hl.selected_text.slice(0, 200) + '...'
    : hl.selected_text;
  $('hlPopupQuestion').textContent = '💬 ' + hl.question;

  // 根据 annotator 类型显示回复
  let answerHtml = '';
  const annotator = hl.annotator || 'aion';
  if (annotator === 'group') {
    if (hl.answer) answerHtml += `<b>${escHtml(aiName)}：</b>\n${hl.answer}\n\n`;
    if (hl.connor_answer) answerHtml += `<b>${escHtml(connorName)}：</b>\n${hl.connor_answer}`;
  } else if (annotator === 'connor') {
    answerHtml = hl.answer || hl.connor_answer || '';
  } else {
    answerHtml = hl.answer || '';
  }
  $('hlPopupAnswer').innerHTML = escHtml(answerHtml).replace(/\n/g, '<br>');
  $('hlPopup').classList.add('show');
}

function closeHlPopup() {
  $('hlPopup').classList.remove('show');
  currentHlId = null;
}

async function deleteCurrentHighlight() {
  if (!currentHlId || !currentBook) return;
  if (!confirm('确认删除这条标注？')) return;
  try {
    await api('DELETE', `/api/books/${currentBook.book_id}/highlights/${currentHlId}`);
    // 从数据中移除
    if (chapterData.highlights) {
      chapterData.highlights = chapterData.highlights.filter(h => h.id !== currentHlId);
    }
    // 移除DOM中的高亮标记
    document.querySelectorAll(`[data-hl-id="${currentHlId}"]`).forEach(el => {
      const parent = el.parentNode;
      while (el.firstChild) parent.insertBefore(el.firstChild, el);
      parent.removeChild(el);
      parent.normalize();
    });
    closeHlPopup();
    showToast('已删除');
  } catch(e) {
    showToast('删除失败');
  }
}
</script>
