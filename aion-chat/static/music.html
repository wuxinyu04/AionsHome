<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>网易云音乐</title>
<link rel="stylesheet" href="/static/common.css">
<style>
:root { --nm-red: #c20c0c; --nm-red2: #e53935; --nm-bar: rgba(20,20,28,0.72); }
.music-app { display:flex; flex-direction:column; height:100%; background:#0a0a0f; color:var(--text); overflow:hidden; position:relative; }
.bg-blur { position:absolute; inset:-40px; z-index:0; background-size:cover; background-position:center; filter:blur(64px) saturate(1.6); opacity:0.45; transition:background-image .6s; transform:scale(1.1); }
.bg-blur::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,10,15,0.25), rgba(10,10,15,0.85)); }
.music-app > * { position:relative; z-index:1; }
.top-bar { display:flex; align-items:center; gap:10px; padding:6px 14px; height:46px; background:var(--nm-bar); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.05); }
.top-bar .title { font-size:16px; font-weight:700; flex:1; }
.top-bar .icon-btn { background:none; border:none; color:var(--text2); font-size:18px; cursor:pointer; padding:6px; }
.tabs { display:flex; gap:6px; padding:8px 12px; overflow-x:auto; scrollbar-width:none; background:var(--nm-bar); backdrop-filter:blur(20px); }
.tabs::-webkit-scrollbar { display:none; }
.tab { background:rgba(255,255,255,0.06); border:none; padding:6px 16px; border-radius:999px; font-size:13px; color:var(--text2); cursor:pointer; white-space:nowrap; }
.tab.active { background:var(--nm-red); color:#fff; }
.panels { flex:1; min-height:0; overflow-y:auto; padding:6px 12px 84px; }
.panel.hidden { display:none; }
.empty-hint { color:var(--text3); font-size:13px; text-align:center; padding:36px 16px; }
.section-title { font-size:13px; font-weight:700; color:var(--text2); margin:14px 4px 8px; }
.song-row { display:flex; align-items:center; gap:11px; padding:7px 8px; border-radius:10px; cursor:pointer; }
.song-row:hover { background:rgba(255,255,255,0.05); }
.song-row.cur { background:rgba(194,12,12,0.18); }
.song-row .cover { width:46px; height:46px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--surface2); }
.song-row .info { flex:1; min-width:0; }
.song-row .name { font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-row .artist { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.song-row .btn { background:none; border:none; font-size:16px; color:var(--text3); cursor:pointer; padding:6px 7px; flex-shrink:0; }
.song-row .btn:hover { color:var(--nm-red2); }
.song-row .like.liked { color:var(--nm-red2); }
.pl-row { display:flex; align-items:center; gap:11px; padding:8px; border-radius:10px; cursor:pointer; }
.pl-row:hover { background:rgba(255,255,255,0.05); }
.pl-row .cover { width:54px; height:54px; border-radius:9px; object-fit:cover; flex-shrink:0; background:var(--surface2); }
.pl-row .info { flex:1; min-width:0; }
.pl-row .name { font-size:14px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pl-row .meta { font-size:12px; color:var(--text2); margin-top:2px; }
.pl-row .arrow { color:var(--text3); font-size:18px; }
.pl-tag { font-size:10px; background:rgba(194,12,12,0.22); color:var(--nm-red2); padding:1px 6px; border-radius:8px; margin-left:4px; vertical-align:middle; }
.pl-back { font-size:13px; color:var(--text2); cursor:pointer; padding:6px 4px 8px; }
.pl-back:hover { color:var(--text); }
.pl-allbtns { display:flex; gap:8px; margin:4px 0 8px; }
.pl-allbtns button { flex:1; padding:8px; border:1px solid rgba(255,255,255,0.12); border-radius:999px; background:rgba(255,255,255,0.04); color:var(--text); font-size:13px; cursor:pointer; }
.search-input { width:100%; box-sizing:border-box; padding:10px 16px; border:1px solid rgba(255,255,255,0.1); border-radius:999px; background:rgba(255,255,255,0.05); color:var(--text); font-size:14px; margin-bottom:10px; }
.search-input:focus { outline:none; border-color:var(--nm-red); }
.home-hero { display:flex; flex-direction:column; padding:18px 8px 8px; }
.home-hero .greet { font-size:22px; font-weight:800; background:linear-gradient(135deg,#fff,#ffb3b3); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.home-hero .sub { font-size:12px; color:var(--text3); margin-top:4px; }
.resume-btn { width:100%; padding:13px; border:none; border-radius:14px; background:linear-gradient(135deg,var(--nm-red2),var(--nm-red)); color:#fff; font-size:14px; font-weight:600; cursor:pointer; margin:12px 0 4px; box-shadow:0 6px 18px rgba(194,12,12,0.35); }
.pl-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:6px; }
.pl-card { display:flex; flex-direction:column; gap:6px; cursor:pointer; }
.pl-card .gc { position:relative; }
.pl-card .gc img { width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; background:var(--surface2); }
.pl-card .gc .cnt { position:absolute; right:5px; top:4px; font-size:10px; color:rgba(255,255,255,0.85); text-shadow:0 1px 3px rgba(0,0,0,0.6); }
.pl-card .gn { font-size:12px; color:var(--text); line-height:1.3; max-height:32px; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.q-clearall { padding:8px 12px; margin-bottom:8px; border-radius:8px; background:rgba(255,255,255,0.04); color:var(--text2); font-size:12px; text-align:center; cursor:pointer; border:1px dashed rgba(255,255,255,0.12); }
.q-clearall:hover { background:rgba(194,12,12,0.12); color:var(--nm-red2); border-color:var(--nm-red2); }
.mini-player { position:absolute; left:8px; right:8px; bottom:8px; height:58px; display:flex; align-items:center; gap:10px; padding:0 12px; background:var(--nm-bar); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,0.35); cursor:pointer; z-index:5; }
.mini-player .mc { width:42px; height:42px; border-radius:9px; object-fit:cover; flex-shrink:0; background:var(--surface2); }
.mini-player .mc.empty { display:grid; place-items:center; font-size:18px; color:var(--text3); }
.mini-player .mi { flex:1; min-width:0; }
.mini-player .mt { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-player .ma { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mini-player .mb { background:none; border:none; font-size:20px; color:var(--text); cursor:pointer; padding:8px; flex-shrink:0; }
.mini-player .mprog { position:absolute; left:12px; right:12px; bottom:0; height:2px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
.mini-player .mprog .mfill { height:100%; width:0; background:var(--nm-red2); transition:width .2s linear; }
.mini-player.hidden { display:none; }
.full-player { position:fixed; inset:0; z-index:50; background:#0a0a0f; display:none; flex-direction:column; }
.full-player.show { display:flex; }
.fp-bg { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(70px) saturate(1.8); opacity:0.5; transform:scale(1.1); }
.fp-bg::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,10,15,0.4), rgba(10,10,15,0.92)); }
.fp-content { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; padding:14px 20px 24px; min-height:0; }
.fp-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.fp-down { background:none; border:none; color:#fff; font-size:26px; cursor:pointer; transform:rotate(90deg); }
.fp-header .ft { flex:1; font-size:13px; color:rgba(255,255,255,0.7); text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fp-cover-wrap { flex:1; min-height:0; display:flex; align-items:center; justify-content:center; }
.fp-cover { width:min(280px,72vw); height:min(280px,72vw); border-radius:16px; object-fit:cover; box-shadow:0 16px 50px rgba(0,0,0,0.5); background:var(--surface2); cursor:pointer; }
.fp-cover.playing { animation: fpSpin 18s linear infinite; }
@keyframes fpSpin { to { transform: rotate(360deg); } }
.fp-info { text-align:center; margin:14px 0 6px; }
.fp-title { font-size:19px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.fp-artist { font-size:13px; color:rgba(255,255,255,0.6); margin-top:4px; }
.fp-progress { margin:14px 0 4px; }
.fp-bar { width:100%; height:4px; accent-color:var(--nm-red2); cursor:pointer; }
.fp-time { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.55); margin-top:3px; font-variant-numeric:tabular-nums; }
.fp-controls { display:flex; align-items:center; justify-content:center; gap:26px; margin:8px 0; }
.fp-controls .nb { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:6px; opacity:0.85; }
.fp-controls .nb.active { color:var(--nm-red2); opacity:1; }
.fp-play { width:62px; height:62px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--nm-red2),var(--nm-red)); color:#fff; font-size:26px; cursor:pointer; box-shadow:0 8px 22px rgba(194,12,12,0.45); display:grid; place-items:center; }
.fp-lyrics { position:absolute; inset:0; z-index:2; background:rgba(10,10,15,0.92); backdrop-filter:blur(20px); display:none; flex-direction:column; padding:50px 20px 30px; }
.fp-lyrics.show { display:flex; }
.fp-lyrics .lb { flex:1; overflow-y:auto; text-align:center; line-height:2.6; font-size:15px; padding:20px 8px; }
.fp-lyrics .ll { color:rgba(255,255,255,0.35); transition:color .25s, transform .25s; padding:3px 0; }
.fp-lyrics .ll.active { color:#fff; font-weight:700; transform:scale(1.06); }
.fp-lyrics .lc { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; align-self:flex-end; transform:rotate(90deg); }
</style>
</head>
<body>
<div class="sub-page music-app">
  <div class="bg-blur" id="bgBlur"></div>
  <div class="top-bar">
    <button class="back-btn">‹</button>
    <span class="title">网易云音乐</span>
    <button class="icon-btn" id="topSearch" title="搜索">🔍</button>
  </div>
  <div class="tabs" id="tabs">

    <button class="tab" data-tab="favorites">喜欢</button>
    <button class="tab" data-tab="playlists">歌单</button>
    <button class="tab" data-tab="search">搜索</button>
    <button class="tab" data-tab="queue">队列</button>
    <button class="tab" data-tab="history">历史</button>
  </div>
  <div class="panels">
    <div class="panel" id="panel-home"></div>
    <div class="panel hidden" id="panel-favorites"></div>
    <div class="panel hidden" id="panel-playlists"></div>
    <div class="panel hidden" id="panel-search">
      <input class="search-input" id="searchInput" placeholder="搜歌名或歌手，回车搜索…">
      <div id="searchList"><div class="empty-hint">输入歌名或歌手搜索</div></div>
    </div>

    <div class="panel hidden" id="panel-history"></div>

  <div class="mini-player hidden" id="miniPlayer">
    <div class="mc empty" id="mcCover">🎵</div>
    <div class="mi"><div class="mt" id="mcTitle">未在播放</div><div class="ma" id="mcArtist"></div></div>
    <button class="mb" id="mcPlay">▶</button>
    <button class="mb" id="mcNext">⏭</button>
    <div class="mprog"><div class="mfill" id="mcFill"></div></div>
  </div>
  <div class="full-player" id="fullPlayer">
    <div class="fp-bg" id="fpBg"></div>
    <div class="fp-content">
      <div class="fp-header"><button class="fp-down" id="fpDown">‹</button><span class="ft" id="fpHeadTitle">正在播放</span></div>
      <div class="fp-cover-wrap"><img class="fp-cover" id="fpCover" alt=""></div>
      <div class="fp-info"><div class="fp-title" id="fpTitle">未在播放</div><div class="fp-artist" id="fpArtist"></div></div>
      <div class="fp-progress"><input class="fp-bar" id="fpBar" type="range" min="0" max="1000" value="0"><div class="fp-time"><span id="fpCur">0:00</span><span id="fpDur">0:00</span></div></div>
      <div class="fp-controls">
        <button class="nb" id="fpShuffle" title="随机">🔀</button>

        <button class="fp-play" id="fpPlay">▶</button>
        <button class="nb" id="fpNext" title="下一首">⏭</button>
        <button class="nb" id="fpRepeat" title="循环">🔁</button>
      </div>
    </div>
    <div class="fp-lyrics" id="fpLyrics">
      <button class="lc" id="lyricsClose">‹</button>
      <div class="lb" id="lyricsBody"></div>
    </div>
  </div>
</div>

<script src="/static/theme.js?v=theme-20260606"></script>
<script src="/static/common.js"></script>
<script>
/* ── 网易云音乐：自带播放器，不依赖父页 ──
   自己的 <audio> + 队列（localStorage 共享，AI 在聊天页点的歌也会进来）。
   播放时暂停父页音频避免双声。离开本页音频停。
   $ / api / escHtml 由 common.js 提供，不再重复声明（否则 const $ 冲突致脚本中止）。 */
const QKEY = 'aion_music_queue_v1', SKEY = 'aion_music_state_v1';
let queue = [], index = -1, repeat = 'off', shuffle = false;
let audio = null, lastCover = null, fullOpen = false, lyricsOpen = false, curTab = 'home';
let lyricsData = [], lyricsIdx = -1, lastSongId = null;
const likedIds = new Set(), songIdx = {};

function loadState() {
  try { queue = JSON.parse(localStorage.getItem(QKEY) || '[]') || []; } catch(e){ queue = []; }
  try { const st = JSON.parse(localStorage.getItem(SKEY) || '{}') || {}; repeat = st.repeat || 'off'; shuffle = !!st.shuffle; index = (typeof st.index === 'number' && st.index < queue.length) ? st.index : -1; } catch(e){}
}
function saveQueue() { try { localStorage.setItem(QKEY, JSON.stringify(queue)); } catch(e){} }
function saveState() { try { localStorage.setItem(SKEY, JSON.stringify({repeat, shuffle, index})); } catch(e){} }
function current() { return (index >= 0 && index < queue.length) ? queue[index] : null; }
function fmt(s) { s = Math.max(0, Math.floor(s||0)); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function ensureAudio() {
  if (audio) return;
  audio = document.createElement('audio');
  audio.volume = (parseInt(localStorage.getItem('musicVolume') ?? '50'))/100;
  audio.addEventListener('timeupdate', onTick);
  audio.addEventListener('play', updatePlayBtns);
  audio.addEventListener('pause', updatePlayBtns);
  audio.addEventListener('ended', onNext);
}
function pauseParentAudio() { try { window.parent.document.getElementById('globalMusicAudio')?.pause(); } catch(e){} }

function playIndex(i, autoplay) {
  ensureAudio();
  if (i < 0 || i >= queue.length) return;
  pauseParentAudio();
  index = i; saveState();
  const song = queue[i];
  audio.src = '/api/music/stream/' + song.id;
  renderNowPlaying(song);
  if (autoplay) audio.play().catch(()=>{});
  reportNowPlaying();
}
function playNow(song) {
  if (!song || song.id == null) return;
  songIdx[song.id] = song;
  let i = queue.findIndex(q => q.id === song.id);
  if (i < 0) { queue.push(song); i = queue.length - 1; saveQueue(); }
  playIndex(i, true);
}
function enqueue(songs, opts) {
  opts = opts || {};
  const list = Array.isArray(songs) ? songs : [songs];
  list.forEach(s => { if (s && s.id != null) { songIdx[s.id] = s; if (!queue.some(q => q.id === s.id)) queue.push(s); } });
  saveQueue();
  if (opts.play && list.length) { const t = list[0]; const i = queue.findIndex(q => q.id === t.id); if (i >= 0) playIndex(i, true); }
  else renderNowPlaying();
  if (curTab === 'queue') renderQueue();
}
function togglePlay() { ensureAudio(); if (!audio.src) { if (queue.length) playIndex(index >= 0 ? index : 0, true); return; } if (audio.paused) audio.play().catch(()=>{}); else audio.pause(); }
function onNext() {
  if (!queue.length) return;
  if (repeat === 'one') { audio.currentTime = 0; audio.play().catch(()=>{}); return; }
  let i = shuffle ? (queue.length === 1 ? 0 : (() => { let n; do { n = Math.floor(Math.random()*queue.length); } while (n === index); return n; })()) : index + 1;
  if (i >= queue.length) { if (repeat === 'all') i = 0; else { index = -1; audio.src = ''; saveState(); renderNowPlaying(); return; } }
  playIndex(i, true);
}
function onPrev() { if (!queue.length) return; if (audio && audio.currentTime > 3) { audio.currentTime = 0; return; } let i = index - 1; if (i < 0) i = repeat === 'all' ? queue.length - 1 : 0; playIndex(i, true); }
function toggleRepeat() { repeat = repeat === 'off' ? 'all' : (repeat === 'all' ? 'one' : 'off'); saveState(); renderNowPlaying(); }
function toggleShuffle() { shuffle = !shuffle; saveState(); renderNowPlaying(); }
function removeFromQueue(i) {
  if (i < 0 || i >= queue.length) return;
  const wasCur = i === index;
  queue.splice(i, 1);
  if (i < index) index--; else if (i === index) index = Math.min(index, queue.length - 1);
  saveQueue();
  if (wasCur && queue.length) playIndex(Math.max(0, index), true);
  else if (!queue.length) { ensureAudio(); audio.pause(); audio.src = ''; index = -1; saveState(); renderNowPlaying(); }
  renderQueue();
}
function clearQueue() {
  if (!queue.length && index < 0) return;
  queue = []; index = -1; ensureAudio(); audio.pause(); audio.src = ''; saveQueue(); saveState();
  reportNowPlaying(true);
  renderNowPlaying(); renderQueue();
}
let _reportTs = 0;
function reportNowPlaying(clear) {
  const cur = current();
  if (clear || !cur) { api('POST', '/api/music/now_playing', { song_id: null }).catch(()=>{}); return; }
  const now = Date.now();
  if (now - _reportTs < 3000) return; _reportTs = now;
  api('POST', '/api/music/now_playing', { song_id: cur.id, name: cur.name, artist: cur.artist, state: (audio && !audio.paused) ? 'playing' : 'paused', position: (audio && audio.currentTime) || 0, queue_count: queue.length }).catch(()=>{});
}

function init() {
  loadState();
  $('miniPlayer').addEventListener('click', e => { if (!e.target.classList.contains('mb')) openFullPlayer(); });
  $('mcPlay').onclick = e => { e.stopPropagation(); togglePlay(); };
  $('mcNext').onclick = e => { e.stopPropagation(); onNext(); };
  $('fpDown').onclick = closeFullPlayer;
  $('fpPlay').onclick = togglePlay;
  $('fpPrev').onclick = onPrev;
  $('fpNext').onclick = onNext;
  $('fpShuffle').onclick = toggleShuffle;
  $('fpRepeat').onclick = toggleRepeat;
  $('fpBar').oninput = e => { ensureAudio(); if (audio.duration) audio.currentTime = (e.target.value/1000)*audio.duration; };
  $('fpCover').onclick = toggleLyrics;
  $('lyricsClose').onclick = () => { $('fpLyrics').classList.remove('show'); lyricsOpen = false; };
  $('topSearch').onclick = () => switchTab('search');
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));
  let st = null;
  $('searchInput').addEventListener('input', () => { clearTimeout(st); st = setTimeout(() => doSearch($('searchInput').value), 350); });
  $('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); clearTimeout(st); doSearch($('searchInput').value); } });
  // 监听 localStorage 跨标签/父页变化（AI 在聊天页点歌时同步队列）
  window.addEventListener('storage', e => { if (e.key === QKEY) { const oldLen = queue.length; queue = readArr(QKEY); if (curTab === 'queue') renderQueue(); if (curTab === 'home') renderHome(); renderNowPlaying(); } });
  // 恢复：如果之前在放，不自动播（浏览器限制），只显示状态
  renderNowPlaying();
  switchTab('home');
  requestAnimationFrame(loop);
}
function readArr(k) { try { return JSON.parse(localStorage.getItem(k) || '[]') || []; } catch(e){ return []; } }

function loop() {
  onTick();
  const cur = current();
  const id = cur ? cur.id : null;
  if (id !== lastSongId) { lastSongId = id; loadLyrics(cur); if (curTab === 'queue') renderQueue(); }
  if (audio && !audio.paused) reportNowPlaying();
  requestAnimationFrame(loop);
}
function setCoverBg(url) { if (url === lastCover) return; lastCover = url; $('bgBlur').style.backgroundImage = url ? `url("${url}")` : ''; $('fpBg').style.backgroundImage = url ? `url("${url}")` : ''; }

function renderNowPlaying(cur) {
  cur = cur || current();
  const has = !!cur;
  $('miniPlayer').classList.toggle('hidden', !has);
  if (!has) return;
  const mc = $('mcCover');
  if (cur.cover) { mc.innerHTML = ''; mc.className = 'mc'; const img = new Image(); img.src = cur.cover; img.style.cssText = 'width:100%;height:100%;border-radius:9px;object-fit:cover;'; mc.appendChild(img); }
  else { mc.innerHTML = '🎵'; mc.className = 'mc empty'; }
  $('mcTitle').textContent = cur.name || '未知';
  $('mcArtist').textContent = cur.artist || '';
  $('fpCover').src = cur.cover || '';
  $('fpTitle').textContent = cur.name || '未知';
  $('fpArtist').textContent = cur.artist || '';
  $('fpHeadTitle').textContent = cur.name || '正在播放';
  $('fpShuffle').classList.toggle('active', shuffle);
  $('fpRepeat').classList.toggle('active', repeat !== 'off');
  $('fpRepeat').textContent = repeat === 'one' ? '🔂' : '🔁';
  setCoverBg(cur.cover);
}
function updatePlayBtns() { const p = audio && !audio.paused && audio.src; $('mcPlay').textContent = p ? '⏸' : '▶'; $('fpPlay').textContent = p ? '⏸' : '▶'; $('fpCover').classList.toggle('playing', !!p); }
function onTick() {
  if (!audio) { $('mcFill').style.width = '0%'; return; }
  const d = audio.duration || 0, c = audio.currentTime || 0, pct = d ? c/d : 0;
  if (!$('fpBar').matches(':active')) $('fpBar').value = d ? pct*1000 : 0;
  $('mcFill').style.width = (pct*100) + '%';
  $('fpCur').textContent = fmt(c); $('fpDur').textContent = fmt(d);
  if (lyricsOpen && lyricsData.length) { let li = -1; for (let i = 0; i < lyricsData.length; i++) { if (lyricsData[i].t <= c + 0.2) li = i; else break; } if (li !== lyricsIdx && li >= 0) { lyricsIdx = li; scrollLyrics(li); } }
}
function openFullPlayer() { fullOpen = true; $('fullPlayer').classList.add('show'); renderNowPlaying(); buildLyrics(); }
function closeFullPlayer() { fullOpen = false; $('fullPlayer').classList.remove('show'); $('fpLyrics').classList.remove('show'); lyricsOpen = false; }
function toggleLyrics() { if (!lyricsData.length) return; lyricsOpen = !lyricsOpen; $('fpLyrics').classList.toggle('show', lyricsOpen); if (lyricsOpen) { buildLyrics(); const c = (audio && audio.currentTime) || 0; let li = -1; for (let i = 0; i < lyricsData.length; i++) { if (lyricsData[i].t <= c + 0.2) li = i; else break; } if (li >= 0) scrollLyrics(li); } }
async function loadLyrics(cur) { lyricsData = []; lyricsIdx = -1; if (!cur || !cur.id) return; try { const res = await api('GET', '/api/music/lyrics/' + cur.id); lyricsData = (res && res.synced) || []; } catch(e){} if (lyricsOpen) buildLyrics(); }
function buildLyrics() { const body = $('lyricsBody'); if (!lyricsData.length) { body.innerHTML = '<div class="empty-hint" style="color:rgba(255,255,255,0.4)">暂无歌词</div>'; return; } body.innerHTML = lyricsData.map((l,i) => `<div class="ll" data-i="${i}">${escHtml(l.text||'')}</div>`).join(''); lyricsIdx = -1; }
function scrollLyrics(idx) { const body = $('lyricsBody'); const lines = body.querySelectorAll('.ll'); if (!lines.length) return; lines.forEach((el,i) => el.classList.toggle('active', i===idx)); const a = lines[idx]; if (a) body.scrollTo({ top: a.offsetTop - body.clientHeight/2 + a.clientHeight/2, behavior: 'smooth' }); }

function switchTab(tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  ['home','favorites','playlists','search','queue','history'].forEach(n => $('panel-'+n).classList.toggle('hidden', n !== tab));
  if (tab === 'home') renderHome();
  else if (tab === 'favorites') loadFavorites();
  else if (tab === 'playlists') loadPlaylists();
  else if (tab === 'search') { const s = $('searchInput'); if (s) s.focus(); }
  else if (tab === 'queue') renderQueue();
  else if (tab === 'history') loadHistory();
}

async function renderHome() {
  const panel = $('panel-home');
  const cur = current();
  let html = `<div class="home-hero"><div class="greet">网易云音乐</div><div class="sub">${queue.length} 首在队列 · 接你的真实曲库</div></div>`;
  if (queue.length > 0) html += `<button class="resume-btn" id="resumeBtn">${cur ? '继续播放《' + escHtml(cur.name) + '》' : '开始播放队列'}</button>`;
  html += `<div class="section-title">你的歌单</div><div class="pl-grid" id="homePlaylists"></div>`;
  html += `<div class="section-title">最近一起听过</div><div id="homeHistory"></div>`;
  panel.innerHTML = html;
  if ($('resumeBtn')) $('resumeBtn').onclick = () => { if (!audio || !audio.src) togglePlay(); else openFullPlayer(); };
  try { const res = await api('GET', '/api/music/playlists'); const pls = (res && res.playlists) || []; const hp = $('homePlaylists');
    if (res && res.error) hp.innerHTML = '<div class="empty-hint">' + escHtml(res.error) + '</div>';
    else if (!pls.length) hp.innerHTML = '<div class="empty-hint">没有歌单</div>';
    else hp.innerHTML = pls.slice(0,9).map((p,i) => `<div class="pl-card" data-pid="${p.id}" data-name="${escHtml(p.name)}"><div class="gc"><img src="${escHtml(p.cover||'')}" alt="" onerror="this.style.visibility='hidden'"><div class="cnt">${p.track_count||0}</div></div><div class="gn">${escHtml(p.name||'未命名')}${i===0?' ♥':''}</div></div>`).join('');
    hp.querySelectorAll('.pl-card').forEach(el => el.onclick = () => { switchTab('playlists'); setTimeout(() => openPlaylist(parseInt(el.dataset.pid), el.dataset.name), 100); });
  } catch(e) { $('homePlaylists').innerHTML = '<div class="empty-hint">加载失败</div>'; }
  try { const res = await api('GET', '/api/music/shared?limit=8'); const songs = (res && res.songs) || []; const hh = $('homeHistory');
    if (!songs.length) hh.innerHTML = '<div class="empty-hint">还没有一起听过的歌</div>';
    else hh.innerHTML = songs.map(s => songRowHtml({id: s.song_id, name: s.name, artist: s.artist, cover: s.cover})).join('');
    bindSongRows(hh);
  } catch(e){}
}
async function loadFavorites() { const panel = $('panel-favorites'); panel.innerHTML = '<div class="empty-hint">加载中…</div>';
  try { const res = await api('GET', '/api/music/favorites'); const songs = (res && res.songs) || [];
    if (res && res.error) { panel.innerHTML = '<div class="empty-hint">' + escHtml(res.error) + '</div>'; return; }
    if (!songs.length) { panel.innerHTML = '<div class="empty-hint">还没有红心歌曲</div>'; return; }
    songs.forEach(s => { if (s && s.id != null) likedIds.add(s.id); });
    panel.innerHTML = songs.map(songRowHtml).join(''); bindSongRows(panel);
  } catch(e) { panel.innerHTML = '<div class="empty-hint">加载失败</div>'; } }
async function loadPlaylists() { const panel = $('panel-playlists'); panel.innerHTML = '<div class="empty-hint">加载中…</div>';
  try { const res = await api('GET', '/api/music/playlists'); const pls = (res && res.playlists) || [];
    if (res && res.error) { panel.innerHTML = '<div class="empty-hint">' + escHtml(res.error) + '</div>'; return; }
    if (!pls.length) { panel.innerHTML = '<div class="empty-hint">没有歌单</div>'; return; }
    panel.innerHTML = pls.map((p,i) => `<div class="pl-row" data-pid="${p.id}" data-name="${escHtml(p.name)}"><img class="cover" src="${escHtml(p.cover||'')}" alt="" onerror="this.style.visibility='hidden'"><div class="info"><div class="name">${escHtml(p.name||'未命名')}${i===0?' <span class="pl-tag">红心</span>':''}</div><div class="meta">${p.track_count||0} 首 · 播放 ${p.play_count||0}</div></div><div class="arrow">›</div></div>`).join('');
    panel.querySelectorAll('.pl-row').forEach(el => el.onclick = () => openPlaylist(parseInt(el.dataset.pid), el.dataset.name));
  } catch(e) { panel.innerHTML = '<div class="empty-hint">加载失败</div>'; } }
async function openPlaylist(pid, name) { const panel = $('panel-playlists'); panel.innerHTML = `<div class="pl-back" id="plBack">‹ 返回歌单</div><div class="empty-hint">加载中…</div>`; $('plBack').onclick = loadPlaylists;
  try { const res = await api('GET', '/api/music/playlist/' + pid); const songs = (res && res.songs) || [];
    let html = `<div class="pl-back" id="plBack2">‹ 返回歌单</div><div class="section-title">${escHtml(name||'')} <span style="color:var(--text3);font-weight:400">${songs.length}首</span></div>`;
    if (songs.length) html += `<div class="pl-allbtns"><button id="plPlayAll">▶ 整单播放</button><button id="plAddAll">➕ 加入队列</button></div>`;
    html += (songs.length ? songs.map(songRowHtml).join('') : '<div class="empty-hint">歌单为空</div>');
    panel.innerHTML = html; $('plBack2').onclick = loadPlaylists;
    if (songs.length) { $('plPlayAll').onclick = () => enqueue(songs, { play: true }); $('plAddAll').onclick = () => enqueue(songs, { play: false }); }
    bindSongRows(panel);
  } catch(e) { panel.innerHTML = '<div class="empty-hint">加载失败</div>'; } }
async function doSearch(q) { const list = $('searchList'); q = (q||'').trim(); if (!q) { list.innerHTML = '<div class="empty-hint">输入歌名或歌手搜索</div>'; return; } list.innerHTML = '<div class="empty-hint">搜索中…</div>';
  try { const res = await api('GET', '/api/music/search?q=' + encodeURIComponent(q) + '&limit=20'); const songs = (res && res.songs) || [];
    if (!songs.length) { list.innerHTML = '<div class="empty-hint">没找到相关歌曲</div>'; return; }
    list.innerHTML = songs.map(songRowHtml).join(''); bindSongRows(list);
  } catch(e) { list.innerHTML = '<div class="empty-hint">搜索失败</div>'; } }
function renderQueue() { const panel = $('panel-queue');
  if (!queue.length) { panel.innerHTML = '<div class="empty-hint">队列为空，去搜索或歌单里加几首</div>'; return; }
  panel.innerHTML = `<div class="q-clearall" id="qClearAll">清空队列（${queue.length}）</div>` + queue.map((s,i) => songRowHtml(s, i, index)).join('');
  const ca = panel.querySelector('#qClearAll'); if (ca) ca.onclick = () => { if (confirm('清空整个队列？')) clearQueue(); };
  panel.querySelectorAll('.song-row').forEach((el, i) => {
    const del = document.createElement('button'); del.className = 'btn'; del.textContent = '✕'; del.title = '移除';
    del.onclick = e => { e.stopPropagation(); removeFromQueue(i); };
    el.appendChild(del);
    el.onclick = () => playIndex(i, true);
  });
}
async function loadHistory() { const panel = $('panel-history'); panel.innerHTML = '<div class="empty-hint">加载中…</div>';
  try { const res = await api('GET', '/api/music/shared?limit=50'); const songs = (res && res.songs) || [];
    if (!songs.length) { panel.innerHTML = '<div class="empty-hint">还没有一起听过的歌</div>'; return; }
    panel.innerHTML = songs.map(s => songRowHtml({id: s.song_id, name: s.name, artist: s.artist, cover: s.cover})).join(''); bindSongRows(panel);
  } catch(e) { panel.innerHTML = '<div class="empty-hint">加载失败</div>'; } }

function songRowHtml(s, i, curIdx) { const liked = likedIds.has(s.id); if (s && s.id != null) songIdx[s.id] = s;
  return `<div class="song-row ${i != null && i === curIdx ? 'cur' : ''}" data-id="${s.id}">
    <img class="cover" src="${escHtml(s.cover||'')}" alt="" onerror="this.style.visibility='hidden'">
    <div class="info"><div class="name">${escHtml(s.name||'未知')}</div><div class="artist">${escHtml(s.artist||'')}</div></div>
    <button class="btn like ${liked?'liked':''}" data-act="like">${liked?'♥':'♡'}</button>
    <button class="btn" data-act="add" title="加入队列">➕</button>
    <button class="btn" data-act="play" title="立即播放">▶</button></div>`; }
function bindSongRows(container) { container.querySelectorAll('.song-row').forEach(el => { el.querySelectorAll('button').forEach(b => { b.onclick = e => { e.stopPropagation(); const id = parseInt(el.dataset.id); const song = songIdx[id] || { id, name: '', artist: '', cover: '' };
    if (b.dataset.act === 'like') toggleLike(id, b); else if (b.dataset.act === 'add') enqueue([song], { play: false }); else if (b.dataset.act === 'play') playNow(song); }; }); }); }
function toggleLike(id, btn) { const liked = btn.classList.contains('liked'); const next = !liked;
  api('POST', '/api/music/like/' + id + '?like=' + next).then(r => { if (r && r.ok) { btn.classList.toggle('liked', next); btn.textContent = next?'♥':'♡'; if (next) likedIds.add(id); else likedIds.delete(id); } }).catch(()=>{}); }

document.addEventListener('DOMContentLoaded', init);
</script>
